display:
  taiwan: 大概 / 大約
  china: 估計
etymology:
  origin: 中國口語「估計」=「大概」，台灣的「估計」僅用於正式估算。
  taiwan_path: 台灣日常說「大概」「大約」「差不多」，「估計」僅用於正式場合（估計成本、估計人數）。
  china_path: 中國日常口語大量使用「估計」代替「大概」：「估計要遲到了」「估計他不來了」。
  fork_cause: 「估計」在中國口語中語義擴大（從正式估算→日常猜測），台灣保留窄義。
notes: 台灣人聽到「這消息一出，網路估計都要炸鍋了」會覺得很中國。台灣會說「大概」。
