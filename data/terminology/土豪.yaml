id: rich-bumpkin
category: daily
fork_type: E
display:
  taiwan: 暴發戶 / 田僑仔
  china: 土豪
etymology:
  origin: 中國「土豪」指炫富的有錢人（原為貶義，現帶戲謔），台灣說「暴發戶」或台語「田僑仔」。
  taiwan_path: 台灣說「暴發戶」（貶義）、台語「田僑仔」（地主炫富，較中性戲謔），不常說「土豪」。
  china_path: 中國「土豪」2013 年後成流行語：「土豪金」（iPhone 金色）「土豪我們做朋友吧」。
  fork_cause: 中國網路重新定義舊詞（原指地方惡霸），台灣保留傳統用法「暴發戶」。
notes: 台灣人知道「土豪」但不會自己用。台語「田僑仔」反而更精準（擁有大量土地的暴發戶）。
