id: reliable
category: daily
fork_type: E
display:
  taiwan: 可靠 / 靠得住
  china: 靠譜
etymology:
  origin: 中國「靠譜」「不靠譜」是日常口語，台灣說「可靠」「靠得住」「不靠譜」不常用。
  taiwan_path: 台灣說「可靠」「靠得住」「穩」「放心」，不太說「靠譜」。
  china_path: 中國「靠譜」「不靠譜」是極高頻口語，幾乎每天都會用到。
  fork_cause: 北方方言口語詞，未在台灣落地。
notes: 「不靠譜」在台灣會聽懂但覺得很中國。台灣人會說「這個人很不可靠」或直接說「很雷」。
