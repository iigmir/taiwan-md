display:
  taiwan: 厲害 / 讚
  china: 給力
etymology:
  origin: 中國「給力」表示厲害、夠力，台灣不使用。
  taiwan_path: 台灣說「厲害」「讚」「猛」「屌」「強」，不說「給力」「不給力」。
  china_path: 中國「給力」2010 年後爆紅，「太給力了」「不給力」是日常感嘆詞。
  fork_cause: 中國網路流行語（源自東北方言），台灣未採用。
notes: 「給力」曾短暫出現在台灣網路上但未落地，台灣人聽到會覺得是中國用語。
updated: 2026-03-30
