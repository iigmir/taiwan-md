id: blender
category: daily
fork_type: A
display:
  taiwan: 果汁機 / 豆漿機
  china: 破壁機
etymology:
  origin: 中國「破壁機」指高速攪拌機，台灣說「果汁機」或「豆漿機」。
  taiwan_path: 台灣依用途稱「果汁機」「豆漿機」「調理機」，不說「破壁機」。
  china_path: 中國「破壁機」指能打破細胞壁的高速攪拌機，是家電常見品類名。
  fork_cause: 中國行銷造詞（強調「破壁」功能），台灣沿用功能性名稱。
notes: 台灣人第一次聽到「破壁機」通常會困惑：要破什麼壁？
