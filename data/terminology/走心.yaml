id: heartfelt
category: daily
fork_type: E
display:
  taiwan: 認真 / 用心
  china: 走心
etymology:
  origin: 中國「走心」表示用心、認真（or 走神、不專心，有歧義），台灣說「用心」「認真」。
  taiwan_path: 台灣說「用心」「認真」「有誠意」。「走心」在台灣不常見。
  china_path: 中國「走心了」表示認真了、用心了。但也有「走心」=走神（不專心）的用法，視語境而定。
  fork_cause: 中國網路流行語，台灣未採用。
notes: 「走心了」在台灣人耳裡可能理解成「分心了」（走神），與中國原意「認真了」完全相反，是經典歧義案例。
