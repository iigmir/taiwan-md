id: bestie
category: daily
fork_type: E
display:
  taiwan: 姐妹淘 / 好姐妹
  china: 閨蜜
etymology:
  origin: 中國「閨蜜」指女性好友，台灣說「姐妹淘」「好姐妹」。
  taiwan_path: 台灣說「姐妹淘」「好姐妹」「死黨」（不分性別），不太用「閨蜜」。
  china_path: 中國「閨蜜」極高頻，專指女性好友，「閨蜜團」「閨蜜旅行」。
  fork_cause: 中國流行語（2010s 社群媒體推動），台灣保留「姐妹淘」。
notes: 「閨蜜」近年在台灣有滲入趨勢（受中國綜藝影響），但大部分台灣人仍說「姐妹淘」。
updated: 2026-03-30
