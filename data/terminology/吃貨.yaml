fork_type: E
display:
  taiwan: 愛吃鬼
  china: 吃貨
etymology:
  origin: 台灣說「愛吃鬼」「老饕」，中國說「吃貨」。
  taiwan_path: 台灣說「愛吃鬼」（可愛口語）、「老饕」（較高級）、「饕客」，不太說「吃貨」。
  china_path: 中國「吃貨」是自嘲式稱號：「我是個吃貨」「吃貨日記」。
  fork_cause: 中國網路自嘲文化造詞，台灣未採用。
notes: 「吃貨」在台灣年輕人中有使用但不普遍。台灣的「愛吃鬼」更口語可愛，「老饕」更有品味感。
