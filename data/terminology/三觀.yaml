id: three-views
category: daily
fork_type: E
display:
  taiwan: 觀念 / 價值觀
  china: 三觀
etymology:
  origin: 中國「三觀」指世界觀、人生觀、價值觀的合稱，台灣不使用此說法。
  taiwan_path: 台灣說「觀念」「價值觀」「想法」，不會把三者打包成「三觀」。「三觀不正」在台灣會覺得奇怪。
  china_path: 中國「三觀」是極高頻日常用語：「毀三觀」「三觀不合」「三觀正」，幾乎等於「觀念」的通用替代詞。
  fork_cause: 中國政治教育體系產出的概念（馬克思主義哲學），滲入日常口語。
notes: 台灣人看到「三觀崩塌」會知道意思但不會自己這樣說，會說「毀掉我的世界觀」或「觀念崩壞」。
updated: 2026-03-30
