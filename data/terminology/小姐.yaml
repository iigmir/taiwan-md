id: young-woman-address
category: daily
fork_type: D
display:
  taiwan: 小姐
  china: 小姐姐
etymology:
  origin: 台灣稱年輕女性「小姐」，中國近年流行「小姐姐」作為親切稱呼。
  taiwan_path: 台灣「小姐」是標準禮貌稱謂，適用於服務業、日常場合，無負面意涵。「護理師小姐」「櫃檯小姐」都很常見。
  china_path: 中國因「小姐」一詞在部分地區有負面聯想，轉而使用「小姐姐」「美女」作為日常稱呼，尤其在網路和年輕族群中。
  fork_cause: 兩岸社會對「小姐」一詞的語感演化不同，中國衍生出「小姐姐」作為安全替代詞。
notes: 台灣「小姐」完全中性，「王小姐」「林小姐」是最正式的稱謂。中國的「小姐姐」帶有親暱感，台灣人聽起來會覺得有點刻意。
