category: daily
fork_type: E
display:
  taiwan: 手段 / 招數 / 老套
  china: 套路
etymology:
  origin: 中國「套路」指固定手法或陷阱，台灣說「手段」「招數」「老套」。
  taiwan_path: 台灣說「手段」「招數」「把戲」「老套」，不太說「套路」「滿滿的套路」。
  china_path: 中國「套路」極高頻：「城市套路深」「滿滿的套路」「別套路我」。
  fork_cause: 中國網路流行語（2016 年後爆紅），台灣未全面採用。
notes: 「套路」在台灣年輕族群中有滲入但不普及。台灣人會說「你這招很老套」而非「你這是套路」。
updated: 2026-03-30
