id: face-value
category: daily
fork_type: E
display:
  taiwan: 容貌 / 長相 / 外表
  china: 顏值
etymology:
  origin: 中國「顏值」指外貌分數化，台灣傳統不使用但近年因網路開始滲入。
  taiwan_path: 台灣說「長相」「外表」「容貌」「帥/美」，不把外貌量化成「值」。
  china_path: 中國「顏值」極高頻：「顏值高」「顏值擔當」「顏值即正義」，已完全日常化。
  fork_cause: 中國網路造詞（2010s），將日語「顔」+ 中文「值」組合，台灣未採用。
notes: 「顏值」在台灣年輕族群中有滲入趨勢，但正式場合不會用。台灣的對應說法是「長得好看」而非「顏值高」。
updated: 2026-03-30
