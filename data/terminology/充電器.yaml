id: chong-dian-qi
category: daily
fork_type: F

display:
  taiwan: 充電器
  china: 充電器

english: charger

etymology:
  origin: 兩岸用詞完全相同（繁簡字差異），但周邊詞彙有別。
  taiwan_path: 台灣說「行動電源」（power bank），「充電器」已成日常必備詞彙。
  china_path: 中國同樣使用「充電器」，「充電寶」是中國對power bank的特有說法。
  fork_point: "~2000s"
  fork_cause: 主詞相同，但周邊詞彙有別（充電寶 vs 行動電源）。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  「充電」衍生出台灣流行語「需要充電一下」（休息恢復精力），是科技詞彙進入日常隱喻的典型案例。

sources:
  - "教育部《重編國語辭典修訂本》：充電"

added: "2026-03-30"
updated: "2026-03-30"
