id: tuo-xie
category: daily
fork_type: F

display:
  taiwan: 拖鞋
  china: 拖鞋

english: slippers

etymology:
  origin: 漢語固有詞，兩岸用詞相同，語感有差異。
  taiwan_path: 台灣氣候炎熱，拖鞋是全年日常，「夾腳拖」另指人字拖，穿拖鞋逛夜市是台灣特色。
  china_path: 中國用法相同，氣候多樣性使使用情境略有不同。
  fork_point: "~1949"
  fork_cause: 同詞不同生活語感，台灣拖鞋文化更具都市隨性感。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣「拖鞋文化」是庶民生活象徵，穿拖鞋逛夜市、便利商店極為普遍，成為外國人觀察台灣的文化標誌。

sources:
  - "教育部《重編國語辭典修訂本》：拖鞋"

