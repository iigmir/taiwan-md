id: pain-word
category: medical
fork_type: D
display:
  taiwan: 痛
  china: 疼
etymology:
  origin: 台灣說「痛」，中國說「疼」，描述身體疼痛感受的用詞偏好不同。
  taiwan_path: 台灣統一用「痛」：「頭痛」「肚子痛」「不痛」「很痛」。「疼」在台灣幾乎只出現在「心疼」（心疼某人）。
  china_path: 中國日常偏好「疼」：「頭疼」「肚子疼」「不疼」「疼死了」。「痛」也用但較書面。
  fork_cause: 同義詞的地域偏好差異，「疼」與「痛」在古漢語中有細微區別（疼偏表面、痛偏深層），但現代使用已混同，兩岸各取一偏好。
notes: 台灣人聽到「不疼」會立刻辨識出對方是中國人。這是最明顯的口語差異之一。
